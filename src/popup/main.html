<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="main.css">
    <script defer src="/shared/utils.js"></script>
    <script defer src="main.js"></script>
  </head>
  <body>
    <div class="header">
      <svg class="logo" viewBox="0 0 48 48" width="20" height="20">
        <rect x="10" y="2" width="28" height="4" rx="1.5" fill="rgba(255,255,255,0.6)"/>
        <rect x="10" y="42" width="28" height="4" rx="1.5" fill="rgba(255,255,255,0.6)"/>
        <path d="M14 6 L14 10 C14 18 20 22 24 24 C20 26 14 30 14 38 L14 42 L34 42 L34 38 C34 30 28 26 24 24 C28 22 34 18 34 10 L34 6 Z" fill="rgba(255,255,255,0.8)"/>
        <path d="M18 38 C18 32 22 29 24 27 C26 29 30 32 30 38 Z" fill="#c9a84e"/>
        <path d="M17 8 C17 14 21 18 24 20 C27 18 31 14 31 8 Z" fill="rgba(255,255,255,0.35)"/>
      </svg>
      <span class="site-name" id="site-name">Curb</span>
      <span class="site-time" id="site-time"></span>
    </div>

    <div id="warn-banner" class="warn-banner hidden">
      <div class="warn-count"><span id="warn-seconds">0</span><span class="warn-unit">s</span></div>
      <div class="warn-text">
        <div class="warn-title">Block imminent</div>
        <div class="warn-sub" id="warn-sub"></div>
      </div>
      <button id="warn-extend" class="warn-extend hidden">+1 min</button>
    </div>

    <div id="track-banner" class="track-banner hidden">
      <div class="track-text">
        <div class="track-title" id="track-host"></div>
        <div class="track-sub">Not tracked yet</div>
      </div>
      <button id="track-btn" type="button" class="track-btn">Track this site</button>
    </div>

    <div id="policy-list" class="policy-list"></div>

    <div id="empty-state" class="empty-state hidden">
      No policies yet.
    </div>

    <div class="footer-section">
      <button id="manage-btn" class="btn-manage">Manage</button>
    </div>
  </body>
</html>
